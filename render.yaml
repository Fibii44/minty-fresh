services:
  - type: web
    name: mintyfresh-web
    env: docker
    plan: free
    dockerFilePath: Dockerfile
    # Run database migrations automatically on every deployment release
    releaseCommand: php artisan migrate --force
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false # Must be set manually in Render dashboard
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: mintyfresh-db
          property: connectionString
      - key: STRIPE_KEY
        sync: false # Must be set manually in Render dashboard
      - key: STRIPE_SECRET
        sync: false # Must be set manually in Render dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # Optional, set manually if using Stripe webhooks
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: database

databases:
  - name: mintyfresh-db
    plan: free
    databaseName: mintyfresh
    user: feby
